<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Filmes</title>
  <link rel="stylesheet" href="styles.css" />
  
</head>
<body>
  <main class="container">
    <h1>Catálogo de Filmes</h1>

    <section class="filters">
      <div class="filter-group">
        <label for="searchInput">Buscar título</label>
        <input id="searchInput" type="search" placeholder="Pesquisar por título..." />
      </div>
      <div class="filter-group">
        <label for="genreSelect">Gênero</label>
        <select id="genreSelect">
          <option value="all">Todos os gêneros</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="yearInput">Ano</label>
        <input id="yearInput" type="number" placeholder="Qualquer ano" min="1900" max="2100" />
      </div>
    </section>

    <section id="filmList" class="film-list"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
